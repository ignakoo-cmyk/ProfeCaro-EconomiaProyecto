# =============================================================================
# Ventana-Work v2 — Docker Compose (PRODUCCIÓN)
# =============================================================================
# Orquestación con PostgreSQL, Backend (Gunicorn), y Frontend (Next.js Standalone)
# Diseñado para desplegar en un servidor Linux (VPS, EC2, Droplet, etc.)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # 1. Base de Datos (PostgreSQL + PostGIS)
  # ---------------------------------------------------------------------------
  db:
    image: postgis/postgis:16-3.4
    platform: linux/amd64
    container_name: ventana-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ventana_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ventana_secreta_prod_123}
      POSTGRES_DB: ${POSTGRES_DB:-ventana_prod_db}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ventana_admin} -d ${POSTGRES_DB:-ventana_prod_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ventana-network

  # ---------------------------------------------------------------------------
  # 2. Backend (Python/FastAPI con Gunicorn para Producción)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ventana-backend-prod
    restart: always
    # Uvicorn con múltiples workers nativos para producción (sin recarga en vivo)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ventana_admin}:${POSTGRES_PASSWORD:-ventana_secreta_prod_123}@db:5432/${POSTGRES_DB:-ventana_prod_db}
      - PLATFORM_FEE_PERCENT=${PLATFORM_FEE_PERCENT:-10}
      - SECRET_KEY=${SECRET_KEY:-clave_secreta_por_defecto_para_desarrollo_123}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ventana-network

  # ---------------------------------------------------------------------------
  # 3. Frontend (Next.js Standalone Build)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ventana-frontend-prod
    restart: always
    environment:
      # API_URL vacío para que use rutas relativas a través del proxy de Next.js
      - NEXT_PUBLIC_API_URL=
    ports:
      - "8009:3000" # Expone Next.js en el puerto 8009 del servidor Linux
    depends_on:
      - backend
    networks:
      - ventana-network

networks:
  ventana-network:
    driver: bridge

volumes:
  pgdata_prod:
    driver: local
