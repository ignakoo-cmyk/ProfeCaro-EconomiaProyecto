# =============================================================================
# Ventana-Work v2 — Docker Compose
# =============================================================================
# Orquestación con PostgreSQL + Hot Module Replacement (HMR) Activo
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # 1. Base de Datos (PostgreSQL + PostGIS)
  # ---------------------------------------------------------------------------
  db:
    image: postgis/postgis:16-3.4
    container_name: ventana-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ventana}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ventana_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ventana_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ventana} -d ${POSTGRES_DB:-ventana_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ventana-network

  # ---------------------------------------------------------------------------
  # 2. Backend (Python/FastAPI)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ventana-backend
    restart: unless-stopped
    # Hot-Reload Activo
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ventana}:${POSTGRES_PASSWORD:-ventana_secret}@db:5432/${POSTGRES_DB:-ventana_db}
      PLATFORM_FEE_PERCENT: ${PLATFORM_FEE_PERCENT:-10}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
    ports:
      - "8009:8000"
    volumes:
      # Montar código fuente para hot-reload en desarrollo
      - ./backend:/code
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ventana-network

networks:
  ventana-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
